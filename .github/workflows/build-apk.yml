name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 7.6.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.6.4'

      - name: Build APK
        run: |
          mkdir -p project/app/src/main/java/com/malek/bloomandbee
          mkdir -p project/app/src/main/assets/www
          cp index.html three.module.js project/app/src/main/assets/www/

          cat > project/settings.gradle << 'GRADLE'
          rootProject.name = 'BloomAndBee'
          include ':app'
          GRADLE

          cat > project/build.gradle << 'GRADLE'
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          GRADLE

          cat > project/app/build.gradle << 'GRADLE'
          apply plugin: 'com.android.application'
          android {
            compileSdkVersion 33
            defaultConfig {
              applicationId 'com.malek.bloomandbee'
              minSdkVersion 24
              targetSdkVersion 33
              versionCode 1
              versionName '1.0'
            }
          }
          GRADLE

          cat > project/app/src/main/AndroidManifest.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            <application
              android:label="Bloom &amp; Bee"
              android:theme="@android:style/Theme.NoTitleBar.Fullscreen"
              android:hardwareAccelerated="true">
              <activity
                android:name=".MainActivity"
                android:exported="true"
                android:configChanges="orientation|screenSize|keyboardHidden">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          XML

          cat > project/app/src/main/java/com/malek/bloomandbee/MainActivity.java << 'JAVA'
          package com.malek.bloomandbee;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.view.WindowManager;
          public class MainActivity extends Activity {
            @Override
            protected void onCreate(Bundle b) {
              super.onCreate(b);
              getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
              WebView wv = new WebView(this);
              setContentView(wv);
              WebSettings ws = wv.getSettings();
              ws.setJavaScriptEnabled(true);
              ws.setAllowFileAccessFromFileURLs(true);
              ws.setAllowUniversalAccessFromFileURLs(true);
              ws.setMediaPlaybackRequiresUserGesture(false);
              ws.setDomStorageEnabled(true);
              wv.loadUrl("file:///android_asset/www/index.html");
            }
          }
          JAVA

          cd project
          gradle wrapper --gradle-version=7.6.4
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Copy APK
        run: cp project/app/build/outputs/apk/debug/app-debug.apk bloom-and-bee.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bloom-and-bee-apk
          path: bloom-and-bee.apk

      - name: Publish Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Bloom & Bee v1.0.${{ github.run_number }}
          body: |
            📱 **Download `bloom-and-bee.apk` below and install it on your Android phone or tablet.**

            You may need to allow "install from unknown sources" in your settings.

            Made with 💕 by Malek, for Ranooma.
          files: bloom-and-bee.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
